<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo de la Página">
        </div>
        <nav>
            <a href="">Inicio</a>
            <a href="">Peliculas</a>
            <a href="">Novedades populares</a>
            <a href="">Mi lista</a>
            <a href="">Explorar salas cercanas</a>
        </nav>
    </header>
    <main>
        <h1>Lista de Películas</h1>
        <div id="movies-container">
            <!-- Las películas se cargarán aquí -->
        </div>
    </main>
    <div class="container">
        <div id="slide">
            <div class="item" style="background-image: url(1.jpg);">
                <div class="content">
                    <div class="name">INTENSAMENTE 2</div>
                    <button>Más información</button>
                </div>
            </div>
            <div class="item" style="background-image: url(2.jpg);">
                <div class="content">
                    <div class="name">LOS TIPOS MALOS</div>
                    <button>Más información</button>
                </div>
            </div>
            <div class="item" style="background-image: url(3.jpg);">
                <div class="content">
                    <div class="name">TROLLS 3</div>
                    <button>Más información</button>
                </div>
            </div>
            <div class="item" style="background-image: url(4.jpg);">
                <div class="content">
                    <div class="name">PARACAIDISMO</div>
                    <button>Más información</button>
                </div>
            </div>
            <div class="item" style="background-image: url(7.jpg);">
                <div class="content">
                    <div class="name">AVATAR</div>
                    <button>Más información</button>
                </div>
            </div>
            <div class="item" style="background-image: url(6.jpg);">
                <div class="content">
                    <div class="name">DUNE</div>
                    <button>Más información</button>
                </div>
            </div>
        </div>
        <div class="buttons">
            <button id="prev"><i class="fa-solid fa-angle-left"></i></button>
            <button id="next"><i class="fa-solid fa-angle-right"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
